name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          archive="todui-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$archive"
          cp "target/${{ matrix.target }}/release/todui" "$archive/"
          cp README.md "$archive/"
          tar -czf "$archive.tar.gz" "$archive"

      - uses: actions/upload-artifact@v4
        with:
          name: todui-${{ matrix.target }}
          path: todui-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub release
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" *.tar.gz SHA256SUMS --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --notes "todui $GITHUB_REF_NAME"
